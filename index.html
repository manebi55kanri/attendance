<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まねび舎の門守</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .btn-group { margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        #in { background: #4caf50; color: white; }
        #out { background: #f44336; color: white; }
        #canvas { width: 100%; max-width: 400px; border: 3px solid #333; border-radius: 10px; background: white; }
        #status { font-weight: bold; margin-top: 15px; color: #555; }
        .selected { border: 4px solid black; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>通塾管理システム　まねび舎の門守</h1>

    <div class="btn-group">
        <button id="in" onclick="setMode('入室')">入室</button>
        <button id="out" onclick="setMode('退室')">退室</button>
    </div>

    <h2 id="displayMode">モードを選択してください</h2>
    <canvas id="canvas"></canvas>
    <div id="status">カメラ起動中...</div>

    <script>
        const video = document.createElement("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d");
        const statusText = document.getElementById("status");
        let currentMode = "";
        let isProcessing = false;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxO3ebyzfR6ln0-fb6f4nppF8XdVcjNVf4W5edO83V9S3xVRRVBeMtFW64Q7r-rD_lotA/exec";

        function setMode(mode) {
            currentMode = mode;
            document.getElementById("displayMode").innerText = mode + "モード実行中";
            document.getElementById("in").classList.toggle("selected", mode === '入室');
            document.getElementById("out").classList.toggle("selected", mode === '退室');
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                if (code && !isProcessing) {
                    if (!currentMode) {
                        alert("先に入室か退室を選択してください！");
                        return;
                    }
                    sendData(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        function sendData(id) {
            isProcessing = true;
            statusText.innerText = "送信中: " + id;
            
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // CORSエラー回避
                body: JSON.stringify({ id: id, mode: currentMode })
            }).then(() => {
                statusText.innerText = "完了！ 2秒後に再開します";
                setTimeout(() => { isProcessing = false; statusText.innerText = "待機中..."; }, 2000);
            }).catch(err => {
                statusText.innerText = "エラー発生";
                isProcessing = false;
            });
        }
    </script>
</body>
</html>
